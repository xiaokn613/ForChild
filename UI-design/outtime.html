<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温馨提醒弹窗</title>
    <style>
        :root {
            --soft-purple: #9575cd;
            --soft-blue: #64b5f6;
            --text-main: #333;
            --text-sub: #888;
            --bg-light: #f3f0ff;
        }

        /* 弹窗遮罩 */
        .wait-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .wait-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        /* 提醒卡片 */
        .wait-card {
            width: 90%;
            max-width: 360px;
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .wait-overlay.show .wait-card {
            transform: translateY(0);
        }

        /* 动画图标容器 */
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: var(--bg-light);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
        }

        .zzz {
            position: absolute;
            font-size: 20px;
            color: var(--soft-purple);
            font-weight: bold;
            animation: sleep-fade 2s infinite;
        }

        @keyframes sleep-fade {
            0% { transform: translate(10px, 0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(30px, -30px); opacity: 0; }
        }

        h3 {
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .wait-msg {
            font-size: 15px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 时间提示标签 */
        .time-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1e88e5;
            padding: 6px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 按钮 */
        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .primary-btn {
            background: var(--soft-purple);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(149, 117, 205, 0.3);
        }

        .secondary-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 14px;
            cursor: pointer;
            padding: 5px;
        }

        .primary-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<button onclick="showWaitModal()">模拟在非规定时间点击</button>

<div class="wait-overlay" id="waitModal">
    <div class="wait-card">
        <div class="icon-wrapper">
            <span>😴</span>
            <span class="zzz" style="animation-delay: 0s;">z</span>
            <span class="zzz" style="animation-delay: 0.6s; left: 60px; top: 20px;">z</span>
        </div>

        <h3>还没到时间哦~</h3>
        <p class="wait-msg">

            等一会我们再来完成任务吧！<br>
            <span class="time-tag">🕒 下次开始时间：14:00</span>
        </p>

        <div class="action-btns">
            <button class="primary-btn" onclick="hideWaitModal()">好哒，我也休息下</button>
            <button class="secondary-btn" onclick="hideWaitModal()">去看看其他任务</button>
        </div>
    </div>
</div>

<script>
    const waitModal = document.getElementById('waitModal');

    function showWaitModal() {
        waitModal.classList.add('show');
    }

    function hideWaitModal() {
        waitModal.classList.remove('show');
    }

    waitModal.addEventListener('click', (e) => {
        if (e.target === waitModal) hideWaitModal();
    });
</script>

</body>
</html>
