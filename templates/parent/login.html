<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长端登录 - 儿童任务管理系统</title>
    <!-- 使用国内 CDN: BootCDN (优先) + Staticfile (备用) -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" onerror="this.href='https://cdn.staticfile.org/twitter-bootstrap/4.6.2/css/bootstrap.min.css'">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" onerror="this.href='https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css'">
    <style>
        :root {
            --ry-primary: #1890ff;
            --ry-success: #52c41a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 24px;
            color: #303133;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .login-header p {
            color: #909399;
            font-size: 14px;
        }
        
        .form-group label {
            font-size: 14px;
            color: #606266;
            font-weight: 500;
        }
        
        .form-control {
            height: 40px;
            border-color: #dcdfe6;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: var(--ry-primary);
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0c4cc;
        }
        
        .input-icon .form-control {
            padding-left: 40px;
        }
        
        .btn-login {
            height: 40px;
            font-size: 16px;
            background: linear-gradient(to right, #1890ff, #096dd9);
            border: none;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-login:hover {
            background: linear-gradient(to right, #40a9ff, #1890ff);
        }
        
        .copyright {
            text-align: center;
            margin-top: 20px;
            color: #909399;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-home" style="color: #1890ff;"></i> 儿童任务管理系统</h1>
            <p>家长端管理平台</p>
        </div>
        
        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/parent/login">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>
        
        <div class="copyright">
            <p>Copyright © 2024 儿童任务管理系统</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
