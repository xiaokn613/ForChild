{% extends "parent/layout.html" %}

{% block title %}任务管理 - 家长端{% endblock %}

{% block content %}
<!-- 面包屑导航 -->
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/parent/dashboard">首页</a></li>
        <li class="breadcrumb-item active" aria-current="page">任务管理</li>
    </ol>
</nav>

<!-- 工具栏 -->
<div class="toolbar">
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-primary" onclick="addTask('daily')">
            <i class="fas fa-clock"></i> 新增定时任务
        </button>
        <button type="button" class="btn btn-warning" onclick="addTask('pet')">
            <i class="fas fa-paw"></i> 新增宠物任务
        </button>
        <button type="button" class="btn btn-danger" onclick="addTask('reinforce')">
            <i class="fas fa-bolt"></i> 新增强化任务
        </button>
    </div>
    <div class="float-right">
        <input type="text" class="form-control d-inline-block" style="width: 200px;" placeholder="搜索任务..." id="searchInput">
        <button class="btn btn-outline-secondary" onclick="searchTasks()">
            <i class="fas fa-search"></i> 搜索
        </button>
        <button type="button" class="btn btn-success ml-2" onclick="exportTasks()">
            <i class="fas fa-download"></i> 导出
        </button>
    </div>
</div>

<!-- 定时任务卡片 -->
<div class="card mb-4">
    <div class="card-header bg-info text-white">
        <i class="fas fa-clock"></i> 定时任务
    </div>
    <div class="card-body">
        <table class="table table-hover" id="dailyTaskTable">
            <thead>
                <tr>
                    <th><input type="checkbox" class="task-checkbox-all" data-type="daily"></th>
                    <th>ID</th>
                    <th>任务名称</th>
                    <th>孩子</th>
                    <th>时间范围</th>
                    <th>重复周期</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="dailyTaskListBody">
                <!-- 数据将通过 JavaScript 动态加载 -->
            </tbody>
        </table>
    </div>
</div>

<!-- 宠物任务卡片 -->
<div class="card mb-4">
    <div class="card-header bg-warning text-white">
        <i class="fas fa-paw"></i> 宠物任务

    <div class="card-body">

                    <th><input type="checkbox" class="task-checkbox-all" data-type="pet"></th>

                    <th>任务名称</th>

<!-- 强化任务卡片 -->

{% block extra_js %}
<script>
// 全局变量：当前排序字段和顺序
var currentSortField = null;
var currentSortOrder = 'asc';

// 页面加载时获取任务列表
$(document).ready(function() {
    loadTaskTemplates();
    showTaskTypeHelp('daily'); // 初始化显示第一个类型的说明
});

// 排序功能
function sortTasks(field) {
    if (currentSortField === field) {
        // 切换排序方向
        currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
    } else {
        currentSortField = field;
        currentSortOrder = 'asc';
    }
    
    fetch('/api/tasks/templates')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                var templates = data.data;
                
                // 前端排序
                templates.sort(function(a, b) {
                    var aVal = a[field];
                    var bVal = b[field];
                    
                    // 处理空值
                    if (!aVal) aVal = '';
                    if (!bVal) bVal = '';
                    
                    // 数字比较
                    if (field === 'star_reward' || field === 'id') {
                        aVal = parseInt(aVal) || 0;
                        bVal = parseInt(bVal) || 0;
                    }
                    
                    // 时间范围特殊处理
                    if (field === 'schedule_time') {
                        if (a.schedule_time_start && a.schedule_time_end) {
                            aVal = a.schedule_time_start;
                        } else if (a.schedule_time) {
                            aVal = a.schedule_time;
                        } else {
                            aVal = '';
                        }
                        if (b.schedule_time_start && b.schedule_time_end) {
                            bVal = b.schedule_time_start;
                        } else if (b.schedule_time) {
                            bVal = b.schedule_time;
                        } else {
                            bVal = '';
                        }
                    }
                    
                    // 状态特殊处理
                    if (field === 'is_active') {
                        aVal = a.is_active ? 1 : 0;
                        bVal = b.is_active ? 1 : 0;
                    }
                    
                    if (currentSortOrder === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });
                
                renderTaskList(templates);
            }
        });
}

// 显示任务类型说明
function showTaskTypeHelp(taskType) {
    var helpText = '';
    switch(taskType) {
        case 'daily':
            helpText = '<i class="fas fa-info-circle"></i> 定时任务：每天在固定时间完成的常规任务，如刷牙、洗脸等生活习惯';
            break;
        case 'pet':
            helpText = '<i class="fas fa-info-circle"></i> 宠物任务：与宠物互动相关的任务，如喂食、清理、玩耍等';
            break;
        case 'reinforce':
            helpText = '<i class="fas fa-info-circle"></i> 强化任务：需要重点培养的习惯任务，建议设置较高的奖励以激励孩子';
            break;
    }
    $('#taskTypeHelp').html(helpText);
}

// 显示编辑时的任务类型说明
function showEditTaskTypeHelp(taskType) {
    var helpText = '';
    switch(taskType) {
        case 'daily':
            helpText = '<i class="fas fa-info-circle"></i> 定时任务：每天在固定时间完成的常规任务，如刷牙、洗脸等生活习惯';
            break;
        case 'pet':
            helpText = '<i class="fas fa-info-circle"></i> 宠物任务：与宠物互动相关的任务，如喂食、清理、玩耍等';
            break;
        case 'reinforce':
            helpText = '<i class="fas fa-info-circle"></i> 强化任务：需要重点培养的习惯任务，建议设置较高的奖励以激励孩子';
            break;
    }
    $('#editTaskTypeHelp').html(helpText);
}

// 加载任务模板列表
function loadTaskTemplates() {
    fetch('/api/tasks/templates')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                var templates = data.data;
                
                // 按任务类型分类渲染
                var dailyTasks = templates.filter(function(t) { return t.task_type === 'daily'; });
                var petTasks = templates.filter(function(t) { return t.task_type === 'pet'; });
                var reinforceTasks = templates.filter(function(t) { return t.task_type === 'reinforce'; });
                
                // 分别渲染到三个卡片
                renderDailyTaskList(dailyTasks);
                renderPetTaskList(petTasks);
                renderReinforceTaskList(reinforceTasks);
            } else {
                layer.msg('加载失败：' + data.message, {icon: 2});
            }
        })
        .catch(error => {
            console.error('Error:', error);
            layer.msg('网络错误', {icon: 2});
        });
}

// 渲染定时任务列表
function renderDailyTaskList(templates) {
    // 排序：按创建时间倒序（默认）
    if (!currentSortField || !currentSortOrder) {
        templates.sort(function(a, b) {
            return new Date(b.created_at) - new Date(a.created_at);
        });
    }
    
    var html = '';
    templates.forEach(function(template) {
        // 时间范围显示
        var timeRange = '-';
        if (template.schedule_time_start && template.schedule_time_end) {
            var startTime = template.schedule_time_start.substring(0, 5);
            var endTime = template.schedule_time_end.substring(0, 5);
            timeRange = `<small>${startTime} ~ ${endTime}</small>`;
        } else if (template.schedule_time) {
            var scheduleTime = template.schedule_time.substring(0, 5);
            timeRange = `<small>${scheduleTime}</small>`;
        }
        
        // 状态显示
        var statusBadge = '';
        if (template.is_active) {
            statusBadge = '<span class="badge badge-success"><i class="fas fa-check-circle"></i> 激活</span>';
        } else {
            statusBadge = '<span class="badge badge-secondary"><i class="fas fa-times-circle"></i> 失活</span>';
        }
        
        // 重复周期显示
        var repeatDaysText = '';
        if (!template.repeat_days) {
            repeatDaysText = '<span class="badge badge-light">不限</span>';
        } else if (template.repeat_days === 'daily') {
            repeatDaysText = '<span class="badge badge-success">每天</span>';
        } else if (template.repeat_days === 'weekly') {
            repeatDaysText = '<span class="badge badge-primary">每周</span>';
        } else if (template.repeat_days === 'monthly') {
            repeatDaysText = '<span class="badge badge-info">每月</span>';
        } else if (template.repeat_days === 'weekdays') {
            repeatDaysText = '<span class="badge badge-warning">工作日</span>';
        } else {
            repeatDaysText = template.repeat_days;
        }
        
        html += `
            <tr>
                <td><input type="checkbox" class="task-checkbox" value="${template.id}" data-type="daily"></td>
                <td>${template.id}</td>
                <td><strong>${template.name}</strong></td>
                <td>${template.child_name}</td>
                <td>${timeRange}</td>
                <td>${repeatDaysText}</td>
                <td>${statusBadge}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editTask(${template.id})" title="编辑">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-${template.is_active ? 'warning' : 'success'}" onclick="toggleTaskStatus(${template.id}, ${template.is_active})" title="${template.is_active ? '失活' : '激活'}">
                        <i class="fas fa-${template.is_active ? 'pause' : 'play'}"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="deleteTask(${template.id})" title="删除">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    $('#dailyTaskListBody').html(html);
}

// 全选功能（按任务类型）
$(document).on('click', '.task-checkbox-all', function() {
    var type = $(this).data('type');
    $('.task-checkbox[data-type="' + type + '"]').prop('checked', this.checked);
});

// 新增任务
function addTask(defaultType) {
    // 默认类型，如果不传则默认为 daily
    if (!defaultType) {
        defaultType = 'daily';
    }
    
    // 先获取孩子列表
    fetch('/api/children/list')
        .then(response => response.json())
        .then(data => {
            if (!data.success) {
                layer.msg('获取孩子列表失败', {icon: 2});
                return;
            }
            
            var childrenOptions = '';
            data.data.forEach(function(child) {
                childrenOptions += `<option value="${child.id}">${child.nickname}</option>`;
            });
            
            layer.open({
                type: 1,
                title: '<i class="fas fa-plus"></i> 新增任务模板',
                area: ['600px', '580px'],
                content: `
                    <div style="padding: 20px;">
                        <form id="addTaskForm">
                            <div class="form-group">
                                <label class="form-label">选择孩子 <span style="color: red;">*</span></label>
                                <select class="form-control" id="addChildId" required>
                                    <option value="">请选择</option>
                                    ${childrenOptions}
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">任务名称 <span style="color: red;">*</span></label>
                                <input type="text" class="form-control" id="addTaskName" placeholder="请输入任务名称" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">任务描述</label>
                                <textarea class="form-control" id="addTaskDesc" rows="3" placeholder="请输入任务描述"></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label">任务类型 <span style="color: red;">*</span></label>
                                <select class="form-control" id="addTaskType" required onchange="showTaskTypeHelp(this.value)">
                                    <option value="daily" ${defaultType === 'daily' ? 'selected' : ''}>日常任务</option>
                                    <option value="pet" ${defaultType === 'pet' ? 'selected' : ''}>宠物任务</option>
                                    <option value="reinforce" ${defaultType === 'reinforce' ? 'selected' : ''}>强化任务</option>
                                </select>
                                <small class="form-text text-muted" id="taskTypeHelp"></small>
                            </div>
                            <hr style="margin: 20px 0; border-top: 1px solid #e8eaec;">
                            <h6 style="margin-bottom: 15px; color: #606266;"><i class="fas fa-gift"></i> 奖励设置</h6>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label class="form-label">星星奖励</label>
                                        <input type="number" class="form-control" id="addStarReward" value="10" min="0">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label class="form-label">徽章奖励</label>
                                        <input type="number" class="form-control" id="addBadgeReward" value="0" min="0">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label class="form-label">奖杯奖励</label>
                                        <input type="number" class="form-control" id="addTrophyReward" value="0" min="0">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">时间范围（可选）</label>
                                <div class="row">
                                    <div class="col-md-5">
                                        <input type="time" class="form-control" id="addScheduleTimeStart" placeholder="开始时间">
                                    </div>
                                    <div class="col-md-2 text-center" style="padding-top: 10px;">至</div>
                                    <div class="col-md-5">
                                        <input type="time" class="form-control" id="addScheduleTimeEnd" placeholder="结束时间">
                                    </div>
                                </div>
                                <small class="form-text text-muted">设置任务可完成的时间段，例如：08:00 ~ 09:00</small>
                            </div>
                            <div class="form-group">
                                <label class="form-label">重复周期</label>
                                <select class="form-control" id="addRepeatDays">
                                    <option value="">不限</option>
                                    <option value="daily">每天</option>
                                    <option value="weekdays">工作日（周一至周五）</option>
                                    <option value="weekly">每周</option>
                                    <option value="monthly">每月</option>
                                </select>
                            </div>
                        </form>
                    </div>
                `,
                success: function(layero, index) {
                    // 弹窗打开成功后，立即显示默认任务类型的说明
                    showTaskTypeHelp('daily');
                },
                btn: ['确定添加', '取消'],
                yes: function(index) {
                    var childId = $('#addChildId').val();
                    var name = $('#addTaskName').val().trim();
                    var description = $('#addTaskDesc').val().trim();
                    var taskType = $('#addTaskType').val();
                    var starReward = parseInt($('#addStarReward').val()) || 0;
                    var badgeReward = parseInt($('#addBadgeReward').val()) || 0;
                    var trophyReward = parseInt($('#addTrophyReward').val()) || 0;
                    var scheduleTimeStart = $('#addScheduleTimeStart').val();
                    var scheduleTimeEnd = $('#addScheduleTimeEnd').val();
                    var repeatDays = $('#addRepeatDays').val();
                    
                    if (!childId) {
                        layer.msg('请选择孩子', {icon: 2, time: 1500});
                        return;
                    }
                    if (!name) {
                        layer.msg('请输入任务名称', {icon: 2, time: 1500});
                        return;
                    }
                    
                    // 校验时间范围

// 搜索任务
function searchTasks() {
    var keyword = $('#searchInput').val().trim();
    
    if (!keyword) {
        loadTaskTemplates();
        return;
    }
    
    // 前端过滤
    fetch('/api/tasks/templates')
        .then(response => response.json())
        .then(data => {
            if (!data.success) {
                layer.msg('加载失败：' + data.message, {icon: 2});
                return;
            }
            
            var filtered = data.data.filter(function(template) {
                return template.name.indexOf(keyword) !== -1 || 
                       (template.description && template.description.indexOf(keyword) !== -1) ||
                       template.child_name.indexOf(keyword) !== -1;
            });
            
            renderTaskList(filtered);
            layer.msg(`找到 ${filtered.length} 个相关任务`, {icon: 1, time: 1000});
        })
        .catch(error => {
            console.error('Error:', error);
            layer.msg('网络错误', {icon: 2});
        });
}

// 导出任务
function exportTasks() {
    layer.confirm('确定要导出所有任务数据吗？将生成 CSV 文件。', {
        icon: 3,
        title: '<i class="fas fa-download"></i> 导出确认'
    }, function(index) {
        layer.load(1);
        
        fetch('/api/tasks/templates')
            .then(response => response.json())
            .then(data => {
                layer.closeAll('loading');
                
                if (!data.success) {
                    layer.msg('获取数据失败：' + data.message, {icon: 2});
                    return;
                }
                
                if (data.data.length === 0) {
                    layer.msg('暂无任务数据', {icon: 0});
                    return;
                }
                
                // 生成 CSV 内容
                var csvContent = '\uFEFF'; // BOM for UTF-8
                csvContent += 'ID,任务名称,任务描述,孩子,类型,奖励星星,奖励徽章,奖励奖杯,定时时间,重复周期,创建时间\n';
                
                data.data.forEach(function(task) {
                    var row = [
                        task.id,
                        `"${task.name}"`,
                        `"${task.description || ''}"`,
                        `"${task.child_name}"`,
                        task.task_type,
                        task.star_reward,
                        task.badge_reward,
                        task.trophy_reward,
                        task.schedule_time || '',
                        task.repeat_days || '',
                        task.created_at
                    ];
                    csvContent += row.join(',') + '\n';
                });
                
                // 创建下载链接
                var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                var url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', '任务模板_' + new Date().format('yyyyMMddhhmmss') + '.csv');
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                layer.msg('导出成功！', {icon: 1, time: 1500});
            })
            .catch(error => {
                layer.closeAll('loading');
                console.error('Error:', error);
                layer.msg('导出失败', {icon: 2});
            });
        
        layer.close(index);
    });
}

// 日期格式化辅助函数
Date.prototype.format = function(fmt) {
    var o = {
        'M+': this.getMonth() + 1,
        'd+': this.getDate(),
        'h+': this.getHours(),
        'm+': this.getMinutes(),
        's+': this.getSeconds()
    };
    if (/(y+)/.test(fmt)) {
        fmt = fmt.replace(RegExp.$1, (this.getFullYear() + '').substr(4 - RegExp.$1.length));
    }
    for (var k in o) {
        if (new RegExp('(' + k + ')').test(fmt)) {
            fmt = fmt.replace(RegExp.$1, (RegExp.$1.length === 1) ? (o[k]) : (('00' + o[k]).substr(('' + o[k]).length)));
        }
    }
    return fmt;
};
