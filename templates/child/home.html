<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 宠物家园</title>
    <style>
        :root {
            --bg-page: #fdfcf4;
            --primary-gradient: linear-gradient(135deg, #3dd2f3, #48c69d);
            --gold: #fbc02d;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.05);
            --text-main: #333;
            --text-sub: #999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "PingFang SC", sans-serif; }

        body {
            background-color: var(--bg-page);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .home-container {
            width: 100%;
            max-width: 1024px;
            background: white;
            border-radius: 40px;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 35px;
        }

        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar-circle { 
            width: 45px; 
            height: 45px; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .stars-display {
            background: #fff9e6;
            color: var(--gold);
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(251, 192, 45, 0.1);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
            padding: 0 35px 35px;
        }

        .welcome-banner {
            background: var(--primary-gradient);
            border-radius: 30px;
            padding: 40px;
            color: white;
            position: relative;
            margin-bottom: 25px;
        }

        .welcome-banner h1 { font-size: 28px; margin-bottom: 10px; }
        .welcome-banner p { opacity: 0.9; font-size: 14px; }

        .honor-card {
            background: #fff;
            border: 2px dashed #e0e0e0;
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .honor-card:hover { border-color: var(--primary-gradient); background: #f0fdf9; }

        .section-box {
            background: #fff;
            border-radius: 30px;
            padding: 25px;
            box-shadow: var(--card-shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            background: #f9f9f9;
            border-radius: 10px;
            padding-left: 10px;
        }

        .check-box {
            width: 22px;
            height: 22px;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .task-item.completed .check-box {
            background: #48c69d;
            border-color: #48c69d;
        }

        .task-item.completed .check-box::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        .task-info h4 { font-size: 15px; margin-bottom: 2px; }
        .task-info p { font-size: 12px; color: var(--text-sub); }
        .task-reward { margin-left: auto; color: var(--gold); font-size: 13px; font-weight: bold; }

        .wish-item {
            margin-bottom: 20px;
        }
        .wish-top {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .wish-progress-bg {
            height: 12px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .wish-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffca28, #ff7043);
            border-radius: 10px;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 20px 35px;
            background: white;
            border-top: 1px solid #f0f0f0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 15px;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text-main);
        }

        .nav-item:hover {
            background: #f5f5f5;
        }

        .nav-item.active {
            background: #e8f5e9;
            color: var(--primary-green);
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #48c69d;
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(72, 198, 157, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="home-container">
    <nav class="top-nav">
        <div class="user-info">
            <div class="avatar-circle">👦</div>
            <div>
                <div style="font-weight: bold;" id="childName">早上好，{{ child.nickname }}</div>
                <div style="font-size: 12px; color: var(--text-sub);">今天也要和宠物开心度过哦</div>
            </div>
        </div>
        <div class="stars-display" id="totalStars">⭐ {{ child.total_stars }} 星星</div>
    </nav>

    <div class="main-layout">
        <div class="content-left">
            <section class="welcome-banner">
                <h1>欢迎回来！</h1>
                {% if pet %}
                <p>你的{{ pet.name }}已经等你好久了，快去看看它吧。</p>
                {% else %}
                <p>快去领养一只属于你的宠物吧！</p>
                {% endif %}
                <div style="position:absolute; right:40px; bottom:20px; font-size:60px; opacity:0.3;">🐾</div>
            </section>

            <div class="section-box">
                <div class="section-header">
                    <span>📅 今日任务</span>
                    <span style="color: #48c69d; font-size: 13px;">全部完成可领大奖</span>
                </div>

                <div id="tasksList">
                    <!-- 任务列表将通过 JS 动态加载 -->
                </div>
            </div>
        </div>

        <div class="content-right">
            <a href="/child/badges" class="honor-card" style="margin-bottom: 25px; text-decoration: none;">
                <div style="font-size: 24px;">🏆</div>
                <div>
                    <div style="font-weight: bold; font-size: 15px;">荣誉墙</div>
                    <div style="font-size: 12px; color: var(--text-sub);">查看你获得的勋章</div>
                </div>
                <div style="margin-left: auto; color: #ccc;">></div>
            </a>

            <div class="section-box">
                <div class="section-header">
                    <span>🎁 愿望单进度</span>
                </div>

                <div id="wishlistsList">
                    <!-- 愿望单将通过 JS 动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/child/home" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </a>
        <a href="/child/tasks" class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-label">任务</span>
        </a>
        <a href="/child/pets" class="nav-item">
            <span class="nav-icon">🐶</span>
            <span class="nav-label">宠物</span>
        </a>
        <a href="/child/shop" class="nav-item">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">商城</span>
        </a>
        <a href="/child/wishlists" class="nav-item">
            <span class="nav-icon">🎯</span>
            <span class="nav-label">愿望</span>
        </a>
    </div>
</div>

<script>
    // 加载今日任务
    async function loadTasks() {
        try {
            const response = await fetch('/api/tasks/today');
            const data = await response.json();
            
            if (data.success) {
                renderTasks(data.data);
            }
        } catch (error) {
            console.error('加载任务失败:', error);
        }
    }

    // 渲染任务列表
    function renderTasks(tasks) {
        const container = document.getElementById('tasksList');
        
        if (tasks.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无任务</div>';
            return;
        }

        container.innerHTML = tasks.map(task => `
            <div class="task-item ${task.status === 'completed' ? 'completed' : ''}" 
                 onclick="${task.status === 'pending' ? `completeTask(${task.id})` : ''}">
                <div class="check-box"></div>
                <div class="task-info">
                    <h4>${task.task_name}</h4>
                    <p>${task.description || ''}</p>
                </div>
                <div class="task-reward">
                    ${task.status === 'completed' ? '已领取' : '+' + task.star_reward + ' 星星'}
                </div>
            </div>
        `).join('');
    }

    // 完成任务
    async function completeTask(taskId) {
        try {
            const response = await fetch('/api/tasks/complete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ task_id: taskId })
            });
            
            const data = await response.json();
            
            if (data.success) {
                // 显示成功提示
                showToast('✅ ' + data.message);
                // 更新星星显示
                document.getElementById('totalStars').textContent = '⭐ ' + data.data.new_total_stars + ' 星星';
                // 重新加载任务
                loadTasks();
            } else {
                alert(data.message);
            }
        } catch (error) {
            alert('操作失败，请稍后重试');
        }
    }

    // 加载愿望单
    async function loadWishlists() {
        try {
            const response = await fetch('/api/wishlists');
            const data = await response.json();
            
            if (data.success) {
                renderWishlists(data.data);
            }
        } catch (error) {
            console.error('加载愿望单失败:', error);
        }
    }

    // 渲染愿望单
    function renderWishlists(wishlists) {
        const container = document.getElementById('wishlistsList');
        
        if (wishlists.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#999;font-size:13px;">暂无愿望单</div>';
            return;
        }

        container.innerHTML = wishlists.map(wish => {
            const percentage = Math.min(100, Math.round((wish.current_progress / wish.target_stars) * 100));
            return `
                <div class="wish-item">
                    <div class="wish-top">
                        <span>${wish.name}</span>
                        <span style="color: var(--gold);">${percentage}%</span>
                    </div>
                    <div class="wish-progress-bg">
                        <div class="wish-progress-fill" style="width: ${percentage}%;"></div>
                    </div>
                    <p style="font-size: 11px; color: #999; margin-top: 5px;">
                        ${wish.is_completed ? '✅ 已完成' : '还差 ' + (wish.target_stars - wish.current_progress) + ' 星星解锁'}
                    </p>
                </div>
            `;
        }).join('');
    }

    // 显示成功提示
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'success-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 3000);
    }

    // 页面加载时初始化
    window.onload = function() {
        loadTasks();
        loadWishlists();
    };
</script>

</body>
</html>
