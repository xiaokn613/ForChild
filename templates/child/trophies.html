<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖杯墙 - 宠物家园</title>
    <style>
        :root { --bg-page: #fdfcf4; --primary-gradient: linear-gradient(135deg, #3dd2f3, #48c69d); --gold: #fbc02d; --text-main: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "PingFang SC", sans-serif; }
        body { background-color: var(--bg-page); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1024px; background: white; border-radius: 40px; min-height: 90vh; padding: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
        .page-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        .trophies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .trophy-card { text-align: center; padding: 30px; border-radius: 20px; border: 3px solid #e0e0e0; transition: all 0.3s; }
        .trophy-card.earned { border-color: var(--gold); background: linear-gradient(135deg, #fff9e6, #fff); box-shadow: 0 5px 25px rgba(251, 192, 45, 0.3); }
        .trophy-icon { font-size: 80px; margin-bottom: 15px; opacity: 0.3; }
        .trophy-card.earned .trophy-icon { opacity: 1; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .trophy-name { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .trophy-desc { font-size: 13px; color: #999; margin-bottom: 10px; }
        .trophy-bonus { font-size: 14px; color: var(--gold); font-weight: bold; }
        .bottom-nav { display: flex; justify-content: space-around; padding: 20px 35px; background: white; border-top: 1px solid #f0f0f0; margin-top: 30px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: var(--text-main); padding: 10px 20px; border-radius: 15px; }
        .nav-item.active { background: #e8f5e9; color: #48c69d; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-title">🏆 我的奖杯墙</div>
    <div class="trophies-grid">
        {% for trophy in trophies %}
        <div class="trophy-card {{ 'earned' if trophy.id in earned_ids else '' }}">
            <div class="trophy-icon">{{ trophy.icon or '🏆' }}</div>
            <div class="trophy-name">{{ trophy.name }}</div>
            <div class="trophy-desc">{{ trophy.description or '' }}</div>
            {% if trophy.id in earned_ids %}
            <div class="trophy-bonus">💫 +{{ trophy.star_bonus }} 星星</div>
            {% endif %}
        </div>
        {% endfor %}
    </div>
    <div class="bottom-nav">
        <a href="/child/home" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">首页</span></a>
        <a href="/child/badges" class="nav-item"><span class="nav-icon">🏅</span><span class="nav-label">徽章</span></a>
        <a href="/child/trophies" class="nav-item active"><span class="nav-icon">🏆</span><span class="nav-label">奖杯</span></a>
    </div>
</div>
</body>
</html>
